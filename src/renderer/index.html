<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;" />
    <title>notepad-ai</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ============== NAV-BAR (60px) — DESIGN.md component ============== -->
      <header class="navbar" id="navbar">
        <div class="navbar-left">
          <a class="wordmark" id="wordmark" role="button" tabindex="0">
            notepad<span class="wordmark-dot">·</span>ai
          </a>
          <div class="navbar-divider" aria-hidden="true"></div>
          <div class="filename-wrap">
            <input
              class="filename"
              id="title"
              value="Untitled"
              spellcheck="false"
              aria-label="Filename"
            />
            <span class="dirty-indicator" id="dirty" aria-hidden="true"></span>
          </div>
        </div>
        <div class="navbar-right" id="navbar-controls">
          <!-- icon buttons injected by toolbar.ts -->
        </div>
      </header>

      <!-- ============== TOOLBAR (44px) — editing only ============== -->
      <div class="toolbar" id="toolbar"></div>

      <!-- ====== CONTENT ROW: workspace + unified chat (CSS-grid push layout) ====== -->
      <div class="content-row">
        <aside id="left-panel" class="left-panel" aria-label="Outline and footnotes"></aside>
        <main class="workspace mode-split">
          <div id="editor-host" class="editor-host"></div>
          <div class="splitter" aria-hidden="true"></div>
          <div id="preview-host" class="preview-host"></div>
        </main>
        <div class="uc-resizer" aria-hidden="true" hidden></div>
        <aside id="unified-chat" class="uc-host" aria-label="AI collaborator" hidden></aside>
      </div>

      <!-- ============== STATUS BAR (28px) ============== -->
      <footer class="statusbar">
        <span id="status" class="status-text">Ready</span>
        <span class="status-spacer"></span>
        <span id="word-count" class="word-count">0 words · 0 chars</span>
      </footer>
    </div>
    <!-- ====== AI floating button (bottom-right, toggles unified chat) ====== -->
    <button id="ai-fab" class="ai-fab" type="button" aria-label="AI">AI</button>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
