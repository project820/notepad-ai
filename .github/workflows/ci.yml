name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run preflight:tessdata
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run test:security-e2e
      - run: npm run test:converter-e2e
      - run: npm run test:html-export
      - run: npm run test:roundtrip-smoke
      - run: npm run knip
